<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Armazém Hora Certa</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <img src="img/logo.png" class="logo">

  <nav>
    <span class="btn-login" onclick="abrirLogin()">Entrar</span>
    <span onclick="abrirCarrinho()">🛒</span>
  </nav>
</header>

<section class="banner">
  <h2>🔥 Ofertas da Semana</h2>
  <p>Os melhores preços você encontra aqui!</p>
</section>

<section class="produtos">
  <h2>Nossos Produtos</h2>

  <div id="listaProdutos"></div>
  <div id="paginacao"></div>
</section>

<!-- LOGIN -->
<div id="loginModal" class="modal">
  <input id="emailModal">
  <input id="senhaModal">
  <button onclick="fazerLogin()">Entrar</button>
</div>

<!-- CARRINHO -->
<div id="carrinhoLateral">
  <div id="itensCarrinho"></div>

  <input id="nomeCliente">
  <input id="telefoneCliente">
  <input id="enderecoCliente">

  <button onclick="finalizarCompra()">Finalizar</button>
</div>

<!-- 🔥 IMPORTANTE: ORDEM CORRETA -->
<script src="js/carrinho.js"></script>
<script src="js/login.js"></script>
<script src="js/main.js"></script>

</body>
</html>
