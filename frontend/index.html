<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Armazém Hora Certa</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d2a6b;
      color: white;
    }

    header {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #busca {
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    #listaProdutos {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1e3c88;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: contain;
      background: white;
    }

    .preco {
      color: #ffd700;
      font-weight: bold;
    }

    button {
      margin-top: 5px;
      padding: 5px;
      cursor: pointer;
    }

    #paginacao {
      text-align: center;
      padding: 10px;
    }

    #paginacao button {
      margin: 3px;
    }

    #carrinho {
      position: fixed;
      right: 0;
      top: 0;
      width: 250px;
      height: 100%;
      background: white;
      color: black;
      padding: 10px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

<header>
  <h2>🕒 Armazém Hora Certa</h2>

  <input 
    id="busca"
    placeholder="Buscar produto..."
    oninput="buscarProdutos()"
  >
</header>

<div id="listaProdutos"></div>

<div id="paginacao"></div>

<div id="carrinho">
  <h3>Carrinho</h3>
  <div id="itensCarrinho"></div>
</div>

<script>
const API = "http://localhost:3000";
</script>

<script src="js/main.js"></script>
<script src="js/carrinho.js"></script>

</body>
</html>
