<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Armazém Hora Certa</title>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
  <img src="/img/logo.png" class="logo">

  <nav>
    <span class="btn-login" onclick="abrirLogin()">Entrar</span>
    <span onclick="abrirCarrinho()">🛒</span>
  </nav>
</header>

<section class="banner">
  <h2>🔥 Ofertas da Semana</h2>
  <p>Os melhores preços você encontra aqui!</p>
</section>

<section class="produtos">
  <h2>Nossos Produtos</h2>

  <div id="listaProdutos" class="grid-produtos"></div>
  <div id="paginacao"></div>
</section>

<!-- 🔥 MODAL LOGIN -->
<div id="loginModal" class="modal">
  <div style="background:white; padding:20px; border-radius:10px; color:black; width:300px;">
    
   <h2>Login</h2>

<input id="emailModal" placeholder="Email">
<input id="senhaModal" type="password" placeholder="Senha">

<button onclick="fazerLogin()">Entrar</button>

<p style="margin-top:10px;">
  Não tem conta?
  <a href="cadastro.html" style="color:blue; cursor:pointer;">
    Criar conta
  </a>
</p>

<button onclick="fecharLogin()">Fechar</button>

  </div>
</div>

<!-- SCRIPTS -->
<script src="/js/api.js"></script>
<script src="/js/carrinho.js"></script>
<script src="/js/login.js"></script>
<script src="/js/main.js"></script>

</body>
</html>
