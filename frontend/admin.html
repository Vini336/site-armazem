<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
  background: #0d2c8b;
  color: white;
  font-family: Arial;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

input {
  padding: 10px;
  margin: 5px;
  width: 100%;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

img {
  width: 100px;
}
</style>

</head>

<body>

<div class="container">

<h1>🛠 Admin Produtos (Seguro)</h1>

<div class="card">
  <h3>Novo Produto</h3>
  <input id="nome" placeholder="Nome">
  <input id="preco" placeholder="Preço">
  <input id="estoque" placeholder="Estoque">
  <input type="file" id="imagem">

  <button onclick="criar()">➕ Criar</button>
</div>

<div id="lista"></div>

</div>

<script>
const API = window.location.hostname === "localhost"
  ? "http://localhost:3000"
  : "https://site-armazem.onrender.com";

const token = localStorage.getItem("token");
const tipo = localStorage.getItem("tipo");

if (!token || tipo !== "admin") {
  alert("Acesso negado 🚫");
  window.location.href = "index.html";
}

async function carregar() {
  const res = await fetch(API + "/produtos/admin", {
    headers: { Authorization: token }
  });

  const produtos = await res.json();

  let html = "";

  produtos.forEach(p => {
    html += `
      <div class="card">
        <img src="${p.imagem}" />
        <h3>${p.nome}</h3>
        💰 R$ ${p.preco} <br>
        📦 Estoque: ${p.estoque || 0} <br>
        <p>Status: ${p.ativo ? "🟢 Ativo" : "🔴 Oculto"}</p>

        <button onclick="editar('${p.id}')">✏️</button>
        <button onclick="deletar('${p.id}')">🗑</button>
        <button onclick="toggleAtivo('${p.id}', ${p.ativo})">
          ${p.ativo ? "Desativar" : "Ativar"}
        </button>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

async function toggleAtivo(id, atual) {
  await fetch(API + "/produtos/" + id, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: token
    },
    body: JSON.stringify({
      ativo: !atual
    })
  });

  carregar();
}

carregar();
</script>

</body>
</html>
