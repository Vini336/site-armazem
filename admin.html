<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
  background: #0d2c8b;
  color: white;
  font-family: Arial;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

input {
  padding: 10px;
  margin: 5px;
  width: 100%;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

img {
  width: 100px;
}
</style>

</head>

<body>

<div class="container">

<h1>🛠 Admin Produtos (Seguro)</h1>

<div class="card">
  <h3>Novo Produto</h3>
  <input id="nome" placeholder="Nome">
  <input id="preco" placeholder="Preço">
  <input id="estoque" placeholder="Estoque">
  <input type="file" id="imagem">

  <button onclick="criar()">➕ Criar</button>
</div>

<div id="lista"></div>

</div>

<script>
const API = "https://site-armazem.onrender.com";

// 🔐 TOKEN
const token = localStorage.getItem("token");
const tipo = localStorage.getItem("tipo");

if (!token || tipo !== "admin") {
  alert("Acesso negado 🚫");
  window.location.href = "index.html";
}

// LISTAR
async function carregar() {
  const res = await fetch(API + "/produtos");
  const produtos = await res.json();

  let html = "";

  produtos.forEach(p => {
    html += `
      <div class="card">
        <img src="${p.imagem}" />
        <h3>${p.nome}</h3>
        💰 R$ ${p.preco} <br>
        📦 Estoque: ${p.estoque || 0}

        <br>

        <button onclick="editar('${p._id}')">✏️</button>
        <button onclick="deletar('${p._id}')">🗑</button>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

// CRIAR
async function criar() {
  const form = new FormData();

  form.append("nome", document.getElementById("nome").value);
  form.append("preco", document.getElementById("preco").value);
  form.append("estoque", document.getElementById("estoque").value);
  form.append("imagem", document.getElementById("imagem").files[0]);

  await fetch(API + "/produtos", {
    method: "POST",
    headers: {
      Authorization: token
    },
    body: form
  });

  carregar();
}

// EDITAR
async function editar(id) {
  const preco = prompt("Novo preço:");
  const estoque = prompt("Novo estoque:");

  await fetch(API + "/produtos/" + id, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: token
    },
    body: JSON.stringify({
      preco: Number(preco),
      estoque: Number(estoque)
    })
  });

  carregar();
}

// DELETE
async function deletar(id) {
  if (!confirm("Deletar?")) return;

  await fetch(API + "/produtos/" + id, {
    method: "DELETE",
    headers: {
      Authorization: token
    }
  });

  carregar();
}

carregar();
</script>

</body>
</html>
