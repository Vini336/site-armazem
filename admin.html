<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>

<body>

<h1>📦 Pedidos</h1>

<div style="margin-bottom:15px;">
  <button onclick="filtrarPedidos('todos')">Todos</button>
  <button onclick="filtrarPedidos('pendente')">Pendentes</button>
  <button onclick="filtrarPedidos('entregue')">Entregues</button>

  <input 
    type="text" 
    id="buscaPedido" 
    placeholder="Buscar por nome ou telefone..."
    oninput="carregarPedidos()"
    style="margin-left:10px; padding:8px; border-radius:6px; border:none;"
  >
</div>

<div class="dashboard">
  <div class="card">💰 <span id="totalVendido">0</span><br>Total vendido</div>
  <div class="card">📦 <span id="totalPedidos">0</span><br>Pedidos</div>
  <div class="card">🟡 <span id="pendentes">0</span><br>Pendentes</div>
  <div class="card">🟢 <span id="entregues">0</span><br>Entregues</div>
</div>

<canvas id="graficoVendas" style="margin:20px;"></canvas>

<h2>⚠️ Estoque Baixo</h2>
<div id="alertaEstoque"></div>

<div id="listaPedidos"></div>

<h2>➕ Criar Produto</h2>

<div class="card-pedido">
  <input type="text" id="novoNome" placeholder="Nome do produto">
  <input type="number" id="novoPreco" placeholder="Preço">
  <input type="number" id="novoStock" placeholder="Estoque">
  <input type="text" id="novaImagem" placeholder="URL da imagem">

  <label>
    <input type="checkbox" id="novaPromocao"> Em promoção
  </label>

  <button onclick="criarProduto()">➕ Criar Produto</button>
</div>

<h2>🛠️ Gerenciar Produtos</h2>
<div id="listaProdutosAdmin"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const API = "http://localhost:3000";
const token = localStorage.getItem("token");
const tipo = localStorage.getItem("tipo");

if (tipo !== "admin") {
  alert("Acesso negado 🚫");
  window.location.href = "index.html";
}

let ultimoTotalPedidos = 0;
let filtroAtual = "todos";
let grafico;

function filtrarPedidos(filtro) {
  filtroAtual = filtro;
  carregarPedidos();
  carregarEstoqueBaixo();
}

async function carregarEstoqueBaixo() {
  const resposta = await fetch(`${API}/estoque-baixo`);
  if (!resposta.ok) return;

  const produtos = await resposta.json();
  const container = document.getElementById("alertaEstoque");

  container.innerHTML = produtos.length === 0
    ? "<p>✅ Tudo ok no estoque</p>"
    : produtos.map(p => `
      <div style="background:#ff4d4d;color:white;padding:10px;border-radius:8px;margin-bottom:10px;">
        ⚠️ ${p.nome}<br>
        Estoque: ${p.stock} | Mínimo: ${p.minStock}
      </div>
    `).join("");
}

async function carregarPedidos() {
  const resposta = await fetch(`${API}/pedidos`, {
    headers: { Authorization: token }
  });

  if (!resposta.ok) {
    alert("Erro ao carregar pedidos");
    return;
  }

  const pedidos = await resposta.json();

  renderizarGrafico(pedidos);

  let html = "";
  let totalGeral = 0;
  let pendentes = 0;
  let entregues = 0;

  pedidos.forEach(p => {
    if (filtroAtual !== "todos" && p.status !== filtroAtual) return;

    if (p.status === "pendente") pendentes++;
    if (p.status === "entregue") entregues++;

    totalGeral += p.total;

    html += `
      <div class="card-pedido">
        <p><strong>${p.nome}</strong></p>
        <p>R$ ${p.total}</p>

        <button onclick="marcarEntregue('${p._id}')">✅</button>
        <button onclick="deletarPedido('${p._id}')">🗑️</button>
        <button onclick="confirmarPagamento('${p._id}')">💳</button>
      </div>
    `;
  });

  document.getElementById("listaPedidos").innerHTML = html;
  document.getElementById("totalVendido").innerText = totalGeral.toFixed(2);
  document.getElementById("pendentes").innerText = pendentes;
  document.getElementById("entregues").innerText = entregues;
}

async function marcarEntregue(id) {
  await fetch(`${API}/pedido/${id}/entregue`, {
    method: "PUT",
    headers: { Authorization: token }
  });
  carregarPedidos();
}

async function deletarPedido(id) {
  await fetch(`${API}/pedido/${id}`, {
    method: "DELETE",
    headers: { Authorization: token }
  });
  carregarPedidos();
}

async function confirmarPagamento(id) {
  await fetch(`${API}/pedido/${id}/pago`, {
    method: "PUT",
    headers: { Authorization: token }
  });
  carregarPedidos();
}

async function carregarProdutosAdmin() {
  const resposta = await fetch(`${API}/produtos`);
  const produtos = await resposta.json();

  document.getElementById("listaProdutosAdmin").innerHTML =
    produtos.map(p => `
      <div class="card-pedido">
        <input value="${p.nome}" id="nome-${p._id}">
        <input value="${p.preco}" id="preco-${p._id}">
        <button onclick="salvarProduto('${p._id}')">💾</button>
      </div>
    `).join("");
}

async function salvarProduto(id) {
  const nome = document.getElementById(`nome-${id}`).value;
  const preco = document.getElementById(`preco-${id}`).value;

  await fetch(`${API}/produto/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: token
    },
    body: JSON.stringify({ nome, preco })
  });
}

async function criarProduto() {
  const nome = document.getElementById("novoNome").value;
  const preco = document.getElementById("novoPreco").value;

  await fetch(`${API}/produto`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: token
    },
    body: JSON.stringify({ nome, preco, stock: 10 })
  });

  carregarProdutosAdmin();
}

function renderizarGrafico(pedidos) {
  const ctx = document.getElementById('graficoVendas');

  const vendas = {};
  pedidos.forEach(p => {
    const d = new Date(p.data).toLocaleDateString();
    vendas[d] = (vendas[d] || 0) + p.total;
  });

  if (grafico) grafico.destroy();

  grafico = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(vendas),
      datasets: [{
        label: 'Vendas',
        data: Object.values(vendas)
      }]
    }
  });
}

carregarPedidos();
carregarProdutosAdmin();
setInterval(carregarPedidos, 5000);
</script>

</body>
</html>
